<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="1040" height="240">
<defs>
  <!-- Hex body gradient -->
  <radialGradient id="hexBg" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#0A2530"/>
    <stop offset="100%" stop-color="#061620"/>
  </radialGradient>
  <!-- Bridge gradient -->
  <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3ABECC"/>
    <stop offset="100%" stop-color="#7AEEF8"/>
  </linearGradient>
  <!-- Text gradient (sym) -->
  <linearGradient id="symGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#96F2FF"/>
    <stop offset="100%" stop-color="#5CD8E8"/>
  </linearGradient>
  <!-- Text gradient (trace) -->
  <linearGradient id="traceGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#56D0DE"/>
    <stop offset="100%" stop-color="#2FA8B8"/>
  </linearGradient>
  <!-- Glow filter -->
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="0.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ═══════════════════════════ ICON MARK ═══════════════════════════ -->
<!-- Hexagon (flat-top, centered at 60,60 in 120x120 space) -->
<polygon points="60,5.5 103.3,28.75 103.3,91.25 60,114.5 16.7,91.25 16.7,28.75"
  fill="url(#hexBg)" stroke="#1B6272" stroke-width="2"/>
<polygon points="60,11 97.8,32 97.8,88 60,109 22.2,88 22.2,32"
  fill="none" stroke="#133840" stroke-width="1" opacity="0.7"/>

<!-- ─── LEFT TREE (BEFORE state) ─── -->
<!-- Vertical root stem -->
<line x1="36" y1="21" x2="36" y2="29" stroke="#1B6272" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

<!-- Root node -->
<circle cx="36" cy="37" r="6" fill="url(#hexBg)" stroke="#46C8D8" stroke-width="2.2" filter="url(#glow2)"/>
<!-- Center dot -->
<circle cx="36" cy="37" r="2" fill="#3AB8C8"/>

<!-- Left arm → left child -->
<line x1="33" y1="41.5" x2="25" y2="58" stroke="#2898A8" stroke-width="2" stroke-linecap="round"/>
<circle cx="25" cy="62" r="5" fill="url(#hexBg)" stroke="#46C8D8" stroke-width="2"/>
<circle cx="25" cy="62" r="2" fill="#3AB8C8"/>

<!-- Right arm → deleted/changed (dashed) -->
<line x1="39" y1="41.5" x2="47" y2="58" stroke="#1B5F6C" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,2.2"/>
<circle cx="47" cy="62" r="5" fill="url(#hexBg)" stroke="#1E6070" stroke-width="2" stroke-dasharray="2.5,2"/>

<!-- Left leaf -->
<line x1="25" y1="67" x2="25" y2="79" stroke="#2898A8" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="25" cy="83" r="4" fill="#38BDCC"/>

<!-- ─── RIGHT TREE (AFTER state) ─── -->
<line x1="84" y1="21" x2="84" y2="29" stroke="#2898A8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

<!-- Root node -->
<circle cx="84" cy="37" r="6" fill="url(#hexBg)" stroke="#60DDEF" stroke-width="2.5" filter="url(#glow2)"/>
<circle cx="84" cy="37" r="2.2" fill="#50D0E0"/>

<!-- Left arm → moved node (solid, bright) -->
<line x1="81" y1="41.5" x2="73" y2="58" stroke="#3ABFCE" stroke-width="2" stroke-linecap="round"/>
<circle cx="73" cy="62" r="5" fill="#38BDCC"/>
<circle cx="73" cy="62" r="2" fill="#071E22"/>

<!-- Right arm → inserted (brightest) -->
<line x1="87" y1="41.5" x2="93" y2="58" stroke="#60DDEF" stroke-width="2" stroke-linecap="round"/>
<circle cx="93" cy="62" r="5" fill="url(#hexBg)" stroke="#60DDEF" stroke-width="2.2"/>

<!-- Right sub-leaf (new) -->
<line x1="93" y1="67" x2="93" y2="79" stroke="#60DDEF" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="93" cy="83" r="4" fill="url(#hexBg)" stroke="#60DDEF" stroke-width="1.8"/>

<!-- Left moved leaf -->
<line x1="73" y1="67" x2="73" y2="79" stroke="#3ABFCE" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="73" cy="83" r="4" fill="#38BDCC"/>

<!-- ─── TRACE BRIDGE (the diff connector — heart of the logo) ─── -->
<!-- Bridge line with glow -->
<line x1="44" y1="37" x2="65" y2="37" stroke="url(#bridgeGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
<!-- Arrow head -->
<path d="M 62,33 L 68,37 L 62,41" fill="none" stroke="#7AEEF8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
<!-- Pivot / center node (the ~ symbol of symtrace) -->
<circle cx="54" cy="37" r="4" fill="#071E22" stroke="#7AEEF8" stroke-width="2" filter="url(#glow)"/>
<circle cx="54" cy="37" r="1.5" fill="#7AEEF8"/>

<!-- Cross-file move arc (dashed) -->
<path d="M 29,83 C 35,93 66,95 69,83" fill="none" stroke="#2898A8" stroke-width="1.5"
  stroke-dasharray="3,2.5" stroke-linecap="round" opacity="0.55"/>

<!-- ═══════════════════════════ WORDMARK ════════════════════════════ -->
<!-- Main text using system monospace with SVG text -->
<!-- "sym" — bright teal -->
<text x="139" y="78"
  font-family="'JetBrains Mono','Fira Code','Cascadia Code','SF Mono','Courier New',monospace"
  font-size="58" font-weight="700" letter-spacing="-1.5"
  fill="url(#symGrad)" filter="url(#glow2)">sym</text>

<!-- "trace" — slightly dimmer teal -->
<text x="285" y="78"
  font-family="'JetBrains Mono','Fira Code','Cascadia Code','SF Mono','Courier New',monospace"
  font-size="58" font-weight="700" letter-spacing="-1.5"
  fill="url(#traceGrad2)">trace</text>

<!-- Thin underline (diff line motif) -->
<line x1="139" y1="87" x2="512" y2="87" stroke="#3ABFCE" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

<!-- Tagline -->
<text x="141" y="103"
  font-family="'JetBrains Mono','Fira Code',monospace"
  font-size="11" font-weight="400" letter-spacing="3.5"
  fill="#2898A8" opacity="0.75">SEMANTIC  DIFF</text>

<!-- Diff bracket decoration (left of icon) -->
<line x1="8" y1="40" x2="8" y2="80" stroke="#1B6272" stroke-width="1.5" opacity="0.4"/>
<line x1="8" y1="40" x2="12" y2="40" stroke="#1B6272" stroke-width="1.5" opacity="0.4"/>
<line x1="8" y1="80" x2="12" y2="80" stroke="#1B6272" stroke-width="1.5" opacity="0.4"/>

</svg>
